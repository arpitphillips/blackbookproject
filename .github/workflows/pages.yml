name: Deploy Web to GitHub Pages

# Builds the alpha frontend and publishes it to GitHub Pages so it can be viewed
# at a live URL. One-time setup: repo Settings -> Pages -> Source = "GitHub
# Actions". Optional: define repo Variables VITE_SUPABASE_URL and
# VITE_SUPABASE_ANON_KEY (Settings -> Secrets and variables -> Actions ->
# Variables) to connect the form to Supabase; without them it deploys in
# demo mode (fallback dropdowns, submissions not saved).
on:
  push:
    branches: [main, claude/creative-professionals-platform-sepeag]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        env:
          VITE_BASE: /blackbookproject/
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
